name: lifequest
description: A premium, proficiency-based financial-literacy game for ages 5–17 · UAE-first
publish_to: 'none'
version: 1.7.1+28

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Motion & animation
  rive: ^0.13.20
  lottie: ^3.3.1
  flutter_animate: ^4.5.2

  # Game engine (Phase 2+)
  flame: ^1.24.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  cloud_functions: ^5.3.4
  firebase_core_web: ^2.24.1
  firebase_auth_web: ^5.15.3
  cloud_firestore_web: ^4.4.12
  cloud_functions_web: ^4.11.5

  # Utils
  intl: ^0.20.2
  google_fonts: ^6.2.1
  equatable: ^2.0.7
  uuid: ^4.5.1
  audioplayers: ^6.1.0
  video_player: ^2.9.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/rive/
    - assets/lottie/
    - assets/img/
    - assets/img/city/
    - assets/audio/
    - assets/video/city_hero.mp4

