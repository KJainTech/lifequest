<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="LifeQuest — learn money by playing">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="lifequest">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>LifeQuest</title>
  <!-- build: 1.6.6+23 -->
</head>
<body>
  <script>
    // Must finish BEFORE Flutter bootstrap — old service workers serve stale orange UI.
    (function () {
      var BUILD = '1.6.6+23';

      function loadFlutter() {
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js?v=' + encodeURIComponent(BUILD);
        s.async = false;
        document.body.appendChild(s);
      }

      function wipeCachesThenLoad() {
        var tasks = [];
        if ('serviceWorker' in navigator) {
          tasks.push(
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            })
          );
        }
        if (window.caches && caches.keys) {
          tasks.push(
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            })
          );
        }
        Promise.all(tasks).finally(function () {
          try { localStorage.setItem('lq_build', BUILD); } catch (_) {}
          loadFlutter();
        });
      }

      var params = new URLSearchParams(window.location.search);
      if (params.has('fresh')) {
        params.delete('fresh');
        var next = window.location.pathname + (params.toString() ? '?' + params : '');
        try { history.replaceState(null, '', next); } catch (_) {}
      }

      var prev = null;
      try { prev = localStorage.getItem('lq_build'); } catch (_) {}
      if (prev !== BUILD) {
        wipeCachesThenLoad();
      } else {
        loadFlutter();
      }
    })();
  </script>
</body>
</html>
